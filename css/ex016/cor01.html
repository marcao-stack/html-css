<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*Configurações globais das CSS*/
            height: 100%;
        }

        body {
            font: 20px Arial;
            background-image: linear-gradient(to bottom, rgb(247, 223, 11), #FA8E4D, rgb(248, 49, 49), #FA4D76);

        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
