<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkgrey;
            
            padding-left: 10px;
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;

            margin: auto;
        }
    </style>
</head>
<body>
   <h1>Exemplo de caixa box level</h1>
   <p>Parágrafos também são exemplos de box level, mas os <a href="#">links</a>
    são exemplos de caixa inline level</p>
   
</body>
</html>
