<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em diversos dispositivos
        diferentes ou mude o tamanho do seu navegador</p>
    
    <picture>
        <source media="(max-width:500px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1000px)" srcset="
        imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo áudios</h1>
    <p>Vamos aprender a reproduzir audio em HTML5</p>
    <audio src="midia/puts-puts.mp3" controls></audio>
</body>
</html>
